# ============================================================
# Forum Gateway Main Configuration
# 
# API Gateway Service Configuration:
# - Service basic info
# - Route rules
# - JWT configuration
# - Logging
# ============================================================

# ==================== Server ====================
server:
  port: 8080

spring:
  application:
    name: forum-gateway

  # ==================== Redis Configuration ====================
  # 用于限流功能的Redis配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  # ==================== Gateway Routes ====================
  cloud:
    gateway:
      routes:
        # ---------- Auth Service ----------
        - id: forum-auth
          uri: http://localhost:9001
          predicates:
            - Path=/api/v1/auth/**

        # ---------- User Service ----------
        - id: forum-user
          uri: http://localhost:9002
          predicates:
            - Path=/api/v1/users/**

        # ---------- Category Service ----------
        - id: forum-category
          uri: http://localhost:9003
          predicates:
            - Path=/api/v1/categories/**

        # ---------- Post Service ----------
        - id: forum-post
          uri: http://localhost:9004
          predicates:
            - Path=/api/v1/posts/**

        # ---------- Comment Service ----------
        - id: forum-comment
          uri: http://localhost:9005
          predicates:
            - Path=/api/v1/comments/**

        # ---------- Interaction Service ----------
        - id: forum-interaction
          uri: http://localhost:9006
          predicates:
            - Path=/api/v1/interactions/**

        # ---------- Report Service ----------
        - id: forum-report
          uri: http://localhost:9007
          predicates:
            - Path=/api/v1/reports/**

        # ---------- Stats Service ----------
        - id: forum-stats
          uri: http://localhost:9008
          predicates:
            - Path=/api/v1/stats/**

        # ---------- Notify Service ----------
        - id: forum-notify
          uri: http://localhost:9009
          predicates:
            - Path=/api/v1/notices/**

        # ---------- File Service ----------
        - id: forum-file
          uri: http://localhost:9010
          predicates:
            - Path=/api/v1/files/**

      # Global CORS（生产环境应限制允许的域名）
      globalcors:
        cors-configurations:
          '[/**]':
            # 开发环境允许localhost，生产环境应配置实际域名
            allowedOriginPatterns:
              - "http://localhost:*"
              - "http://127.0.0.1:*"
            # 生产环境请取消注释并配置实际域名：
            # allowedOrigins:
            #   - "https://yourdomain.com"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

      # Default Filters
      default-filters:
        - AddRequestHeader=X-Gateway-Name, forum-gateway

# ==================== JWT Configuration ====================
# 注意：生产环境必须通过环境变量配置密钥，不要使用默认值
jwt:
  secret: ${JWT_SECRET:}  # 必须从环境变量注入，无默认值
  expiration: 604800000
  prefix: Bearer
  header: Authorization

# ==================== Logging ====================
logging:
  level:
    root: INFO
    com.campus.forum: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"

# ==================== Actuator ====================
# 注意：生产环境应限制暴露的端点，并使用独立管理端口
management:
  endpoints:
    web:
      exposure:
        include: health  # 只暴露health端点
  endpoint:
    health:
      show-details: never  # 不显示详细信息
    gateway:
      enabled: false  # 禁用gateway端点暴露
  # server:
  #   port: 8081  # 生产环境建议使用独立管理端口

# ==================== Service Info ====================
info:
  app:
    name: Forum Gateway
    description: API Gateway Service - Unified entry, routing, authentication
    version: 1.0.0
