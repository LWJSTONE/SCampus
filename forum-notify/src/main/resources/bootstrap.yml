# ============================================================
# Bootstrap配置文件
# 
# 此配置文件在application.yml之前加载，用于配置：
# - Nacos配置中心连接信息
# - 命名空间
# - 配置文件格式
# ============================================================

spring:
  application:
    name: forum-notify
  
  profiles:
    active: dev
  
  cloud:
    nacos:
      # Nacos配置中心
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:dev}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yaml
        prefix: ${spring.application.name}
        enabled: true
        refresh-enabled: true
        # 共享配置
        shared-configs:
          - data-id: common.yaml
            group: ${NACOS_GROUP:DEFAULT_GROUP}
            refresh: true
        
        # 扩展配置
        extension-configs:
          - data-id: database.yaml
            group: ${NACOS_GROUP:DEFAULT_GROUP}
            refresh: true
          - data-id: redis.yaml
            group: ${NACOS_GROUP:DEFAULT_GROUP}
            refresh: true
