# ==================== 服务基础配置 ====================
server:
  port: 9004
  # 注意：移除context-path配置，因为Controller已定义完整路径/api/v1/posts
  # 如需添加context-path，需要同步修改网关路由配置
  tomcat:
    uri-encoding: UTF-8
    max-threads: 200
    accept-count: 100

# ==================== Spring 配置 ====================
spring:
  application:
    name: forum-post

  # ==================== 数据源配置 ====================
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/forum_post_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    druid:
      # 初始连接数
      initial-size: 5
      # 最小连接池数量
      min-idle: 10
      # 最大连接池数量
      max-active: 20
      # 配置获取连接等待超时的时间
      max-wait: 60000
      # 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位是毫秒
      time-between-eviction-runs-millis: 60000
      # 配置一个连接在池中最小生存的时间，单位是毫秒
      min-evictable-idle-time-millis: 300000
      # 配置一个连接在池中最大生存的时间，单位是毫秒
      max-evictable-idle-time-millis: 900000
      # 配置检测连接是否有效
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      # 打开PSCache，并且指定每个连接上PSCache的大小
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      # 配置监控统计拦截的filters
      filters: stat,wall
      # 开启监控页面
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: admin
        reset-enable: false
      # 开启Web监控
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"

  # ==================== Redis 配置 ====================
  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 10000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0

  # ==================== Jackson 配置 ====================
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false

  # ==================== 文件上传配置 ====================
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 100MB

# ==================== MyBatis Plus 配置 ====================
mybatis-plus:
  # Mapper XML 文件位置
  mapper-locations: classpath:mapper/**/*.xml
  # 实体类扫描路径
  type-aliases-package: com.campus.forum.entity
  # 配置
  configuration:
    # 开启驼峰命名转换
    map-underscore-to-camel-case: true
    # 日志输出
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 二级缓存
    cache-enabled: false
    # 懒加载
    lazy-loading-enabled: true
  # 全局配置
  global-config:
    # 数据库配置
    db-config:
      # 主键类型（AUTO 自增，ASSIGN_ID 雪花算法）
      id-type: AUTO
      # 逻辑删除字段
      logic-delete-field: deleteFlag
      # 逻辑删除值
      logic-delete-value: 1
      # 逻辑未删除值
      logic-not-delete-value: 0
      # 字段策略
      insert-strategy: not_null
      update-strategy: not_null
    # 关闭 Banner
    banner: false

# ==================== Feign 配置 ====================
feign:
  # 开启 Sentinel 支持
  sentinel:
    enabled: true
  # 开启压缩
  compression:
    request:
      enabled: true
      mime-types: text/xml,application/xml,application/json
      min-request-size: 2048
    response:
      enabled: true
  # 客户端配置
  client:
    config:
      default:
        connect-timeout: 5000
        read-timeout: 5000
        logger-level: full

# ==================== Sentinel 配置 ====================
management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always

# ==================== Knife4j API文档配置 ====================
knife4j:
  enable: true
  setting:
    language: zh_cn
    swagger-model-name: 实体类列表

# ==================== 日志配置 ====================
logging:
  level:
    root: info
    com.campus.forum: debug
    com.campus.forum.mapper: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"

# ==================== 帖子服务自定义配置 ====================
post:
  # 敏感词配置
  sensitive:
    enabled: true
    # 敏感词列表（可通过配置中心动态更新）
    words: 色情,暴力,赌博,毒品,诈骗
    # 敏感词替换字符
    replacement: "***"
  # XSS过滤配置
  xss:
    # 是否启用XSS过滤（建议保持开启）
    enabled: true
  # 热门帖子配置
  hot:
    # 热门帖子缓存过期时间（秒）
    cache-expire: 3600
    # 热门帖子数量
    limit: 10
  # 帖子审核配置
  audit:
    enabled: false
    # 需要审核的帖子类型
    types: 1,2,3

# ==================== 内部服务安全配置 ====================
app:
  # 内部服务调用密钥（生产环境请使用环境变量配置）
  internal-service-key: ${INTERNAL_SERVICE_KEY:campus-forum-internal-key-2024}
