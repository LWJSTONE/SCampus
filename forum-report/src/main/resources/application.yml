# ============================================================
# Forum Report Service 主配置文件
# 
# 审核服务配置，包含：
# - 服务基本信息
# - 数据库配置
# - Redis缓存配置
# - MyBatis Plus配置
# - Feign配置
# - 日志配置
# ============================================================

# ==================== 服务配置 ====================
server:
  port: 9007

spring:
  application:
    name: forum-report

  # ==================== 数据源配置 ====================
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/forum_report_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
    
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: admin
        reset-enable: false
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"

  # ==================== Redis配置 ====================
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: 7
    timeout: 10000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0

  # ==================== Jackson配置 ====================
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

# ==================== MyBatis Plus配置 ====================
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.campus.forum.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    cache-enabled: false
    lazy-loading-enabled: true
  global-config:
    db-config:
      id-type: AUTO
      logic-delete-field: deleteFlag
      logic-delete-value: 1
      logic-not-delete-value: 0
      insert-strategy: not_null
      update-strategy: not_null
    banner: false

# ==================== Feign配置 ====================
feign:
  sentinel:
    enabled: true
  compression:
    request:
      enabled: true
      mime-types: text/xml,application/xml,application/json
      min-request-size: 2048
    response:
      enabled: true
  client:
    config:
      default:
        connect-timeout: 5000
        read-timeout: 10000
        logger-level: BASIC

# ==================== Knife4j配置 ====================
knife4j:
  enable: true
  production: false
  basic:
    enable: false
    username: admin
    password: admin

# ==================== Swagger配置 ====================
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  group-configs:
    - group: 审核服务API
      paths-to-match: /api/v1/reports/**

# ==================== 日志配置 ====================
logging:
  level:
    root: INFO
    com.campus.forum: DEBUG
    org.springframework.web: INFO
    org.springframework.cloud: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/forum-report.log
    max-size: 10MB
    max-history: 30

# ==================== Actuator配置 ====================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  health:
    db:
      enabled: true
    redis:
      enabled: true

# ==================== 服务信息 ====================
info:
  app:
    name: Forum Report Service
    description: 审核服务 - 提供举报、审核、禁言等功能
    version: 1.0.0
    author: Campus Team

# ==================== 业务配置 ====================
report:
  # 举报原因最大长度
  max-reason-length: 500
  # 处理备注最大长度
  max-remark-length: 500
  # 默认禁言天数
  default-ban-days: 7
  # 最大禁言天数
  max-ban-days: 365

# ==================== 内部服务安全配置 ====================
app:
  # 内部服务调用密钥（生产环境请使用环境变量配置）
  internal-service-key: ${INTERNAL_SERVICE_KEY:campus-forum-internal-key-2024}
