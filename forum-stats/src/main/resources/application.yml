# ============================================================
# Forum Stats Service 主配置文件
# 
# 统计服务配置，包含：
# - 服务端口配置
# - 数据库连接配置
# - Redis缓存配置
# - MyBatis Plus配置
# - 日志配置
# ============================================================

# ==================== 服务配置 ====================
server:
  port: 9008

spring:
  application:
    name: forum-stats

  # ==================== 数据库配置 ====================
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/forum_stats_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      max-evictable-idle-time-millis: 900000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: admin
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"

  # ==================== Redis配置 ====================
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0
      password: ${REDIS_PASSWORD:}
      timeout: 10000
      lettuce:
        pool:
          max-active: 200
          max-wait: -1
          max-idle: 10
          min-idle: 0

  # ==================== 文件上传配置 ====================
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 100MB

  # ==================== Jackson配置 ====================
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

# ==================== MyBatis Plus配置 ====================
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.campus.forum.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: AUTO
      logic-delete-field: deleteFlag
      logic-delete-value: 1
      logic-not-delete-value: 0
    banner: false

# ==================== Knife4j API文档配置 ====================
knife4j:
  enable: true
  production: false
  basic:
    enable: false

# ==================== 日志配置 ====================
logging:
  level:
    root: INFO
    com.campus.forum: DEBUG
    org.springframework.web: INFO
    org.springframework.cloud: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/forum-stats.log
    max-size: 10MB
    max-history: 30

# ==================== Actuator配置 ====================
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# ==================== 服务信息 ====================
info:
  app:
    name: Forum Stats Service
    description: 统计服务 - 数据统计、报表导出等功能
    version: 1.0.0
    author: Campus Team
