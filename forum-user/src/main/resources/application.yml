# ============================================================
# Forum User Service 主配置文件
# 
# 用户服务配置，包含：
# - 服务端口配置
# - 数据库连接配置
# - Redis缓存配置
# - MyBatis Plus配置
# - 日志配置
# ============================================================

# ==================== 服务配置 ====================
server:
  port: 9002

spring:
  application:
    name: forum-user

  # ==================== 数据库配置 ====================
  datasource:
    # 数据库连接地址
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/forum_user_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    # 数据库用户名
    username: ${MYSQL_USERNAME:root}
    # 数据库密码
    password: ${MYSQL_PASSWORD:123456}
    # 数据库驱动
    driver-class-name: com.mysql.cj.jdbc.Driver
    # Druid连接池配置
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      # 初始连接数
      initial-size: 5
      # 最小连接池数量
      min-idle: 5
      # 最大连接池数量
      max-active: 20
      # 配置获取连接等待超时的时间
      max-wait: 60000
      # 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位毫秒
      time-between-eviction-runs-millis: 60000
      # 配置一个连接在池中最小生存的时间，单位毫秒
      min-evictable-idle-time-millis: 300000
      # 配置一个连接在池中最大生存的时间，单位毫秒
      max-evictable-idle-time-millis: 900000
      # 配置检测连接是否有效
      validation-query: SELECT 1
      # 申请连接时执行validationQuery检测连接是否有效
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      # 打开PSCache，并且指定每个连接上PSCache的大小
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      # 配置监控统计拦截的filters
      filters: stat,wall
      # 开启监控页面
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: admin
      # 开启Web监控
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"

  # ==================== Redis配置 ====================
  data:
    redis:
      # Redis服务器地址
      host: ${REDIS_HOST:localhost}
      # Redis服务器端口
      port: ${REDIS_PORT:6379}
      # Redis数据库索引（默认为0）
      database: 0
      # Redis服务器连接密码（默认为空）
      password: ${REDIS_PASSWORD:}
      # 连接超时时间（毫秒）
      timeout: 10000
      # 连接池配置
      lettuce:
        pool:
          # 连接池最大连接数
          max-active: 200
          # 连接池最大阻塞等待时间（使用负值表示没有限制）
          max-wait: -1
          # 连接池中的最大空闲连接
          max-idle: 10
          # 连接池中的最小空闲连接
          min-idle: 0

  # ==================== 文件上传配置 ====================
  servlet:
    multipart:
      # 是否启用文件上传
      enabled: true
      # 单个文件最大大小
      max-file-size: 10MB
      # 总上传文件最大大小
      max-request-size: 100MB

# ==================== MyBatis Plus配置 ====================
mybatis-plus:
  # Mapper XML文件位置
  mapper-locations: classpath*:/mapper/**/*.xml
  # 实体类扫描路径
  type-aliases-package: com.campus.forum.entity
  # 配置
  configuration:
    # 开启驼峰命名转换
    map-underscore-to-camel-case: true
    # 日志输出
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  # 全局配置
  global-config:
    # 数据库配置
    db-config:
      # 主键类型（AUTO-自增，ASSIGN_ID-雪花算法）
      id-type: AUTO
      # 逻辑删除字段
      logic-delete-field: deleteFlag
      # 逻辑删除值
      logic-delete-value: 1
      # 逻辑未删除值
      logic-not-delete-value: 0
    # 关闭Banner
    banner: false

# ==================== Knife4j API文档配置 ====================
knife4j:
  # 是否启用增强模式
  enable: true
  # 是否启用生产环境保护
  production: false
  # Basic认证
  basic:
    enable: false

# ==================== 日志配置 ====================
logging:
  level:
    root: INFO
    com.campus.forum: DEBUG
    org.springframework.web: INFO
    org.springframework.cloud: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/forum-user.log
    max-size: 10MB
    max-history: 30

# ==================== Actuator配置 ====================
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# ==================== 服务信息 ====================
info:
  app:
    name: Forum User Service
    description: 用户服务 - 用户管理、用户关注等功能
    version: 1.0.0
    author: Campus Team

# ==================== 内部服务安全配置 ====================
app:
  # 内部服务调用密钥（生产环境请使用环境变量配置）
  # 用于验证服务间Feign调用的合法性，防止外部伪造请求
  internal-service-key: ${INTERNAL_SERVICE_KEY:campus-forum-internal-key-2024}
